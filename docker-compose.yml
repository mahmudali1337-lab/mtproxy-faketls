services:
  teleproxy:
    image: ghcr.io/teleproxy/teleproxy:latest
    container_name: teleproxy
    restart: unless-stopped
    ports:
      - "${PORT:-443}:${PORT:-443}"
      - "127.0.0.1:${STATS_PORT:-8888}:${STATS_PORT:-8888}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      SECRET: "${SECRET:?set SECRET (32 hex chars)}"
      PORT: "${PORT:-443}"
      STATS_PORT: "${STATS_PORT:-8888}"
      WORKERS: "${WORKERS:-1}"
      EE_DOMAIN: "${EE_DOMAIN:-www.cloudflare.com}"
      PROXY_TAG: "${PROXY_TAG:-}"
      EXTERNAL_IP: "${EXTERNAL_IP:-}"
    volumes:
      - ./data:/opt/teleproxy/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${STATS_PORT:-8888}/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
